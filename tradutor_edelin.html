<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indomitus Fantasy - Alfabeto Edelin (Imperial)</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --primary-hover: #f7c873;
            --primary-glow: rgba(212, 175, 55, 0.5);
            --bg-dark: #08080a;
            --bg-panel: rgba(20, 20, 25, 0.95);
            --bg-input: rgba(10, 10, 12, 0.9);
            --text-main: #f4f4f4;
            --text-muted: #b0b0b0;
            --border-glow: 0 0 20px rgba(212,175,55,0.15);
            --transition: all 0.4s ease;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cinzel', serif;
            background-image: 
                url('https://www.transparenttextures.com/patterns/dark-matter.png'),
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        header {
            background: linear-gradient(to bottom, #000, rgba(15,15,20,0.9));
            border-bottom: 2px solid var(--primary);
            padding: 25px 0;
            text-align: center;
            box-shadow: 0 5px 30px rgba(0,0,0,0.8);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            margin: 0; font-size: 2.8em; color: var(--primary);
            text-shadow: 0 0 15px var(--primary-glow);
            font-family: 'MedievalSharp', serif;
            letter-spacing: 3px;
        }

        nav ul {
            list-style: none; padding: 0; margin: 15px 0 0 0;
            display: flex; justify-content: center; gap: 40px;
        }

        nav a {
            color: var(--text-muted); text-decoration: none;
            font-size: 1em; font-weight: bold; transition: var(--transition);
            letter-spacing: 1px;
        }

        nav a:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        main { max-width: 1000px; margin: 60px auto; padding: 0 30px; width: 100%; box-sizing: border-box; }

        .translator-container {
            background: var(--bg-panel);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 15px; padding: 50px;
            box-shadow: var(--border-glow);
            position: relative;
            overflow: hidden;
        }

        .translator-container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
        }

        .translator-header { text-align: center; margin-bottom: 40px; }
        .translator-header h2 { 
            color: var(--primary); font-size: 2.5em; margin: 0; 
            font-family: 'MedievalSharp', serif; letter-spacing: 2px;
        }
        .translator-header p { color: var(--text-muted); font-size: 1.1em; margin-top: 10px; font-style: italic; }

        .input-box { margin-bottom: 40px; }
        textarea {
            width: 100%; min-height: 150px; padding: 25px; 
            background: var(--bg-input); border: 1px solid #333; border-radius: 10px;
            color: var(--text-main); font-family: 'Cinzel', serif; font-size: 1.2em;
            resize: vertical; transition: var(--transition); box-sizing: border-box;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(212,175,55,0.2); outline: none; }

        .output-box {
            background: rgba(5,5,7,0.8); border: 2px solid rgba(212,175,55,0.1);
            border-radius: 12px; padding: 40px; min-height: 120px;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: var(--transition);
        }

        .output-label {
            position: absolute; top: -12px; left: 30px; background: #1a1a1e;
            padding: 0 15px; color: var(--primary); font-size: 0.9em;
            text-transform: uppercase; font-weight: bold; letter-spacing: 2px;
            border-radius: 4px; border: 1px solid rgba(212,175,55,0.2);
        }

        .translation-text {
            font-size: 2em; color: var(--primary); text-align: center;
            font-family: 'Cinzel', serif; line-height: 1.4;
            text-shadow: 0 0 15px var(--primary-glow);
            word-wrap: break-word; white-space: pre-wrap;
        }

        .error-log {
            color: #ff3333; text-align: center; margin-top: 20px;
            font-size: 0.9em; min-height: 1.2em; text-shadow: 0 0 5px rgba(255,0,0,0.3);
        }

        footer {
            margin-top: auto; padding: 40px; text-align: center;
            color: var(--text-muted); font-size: 0.9em;
            border-top: 1px solid rgba(212,175,55,0.05);
        }

        * { box-sizing: border-box; }
        :root { --primary:#f6e2b4; --primary-hover:#fff4dc; --primary-glow:rgba(191, 213, 255, 0.24); --bg-dark:#0a101c; --bg-panel:rgba(19, 27, 44, 0.84); --bg-input:rgba(11, 17, 30, 0.9); --text-main:#f8fbff; --text-muted:#c4d0e4; --border-glow:0 24px 58px rgba(8, 13, 23, 0.36); --secondary:#bfd5ff; }
        body { position:relative; overflow-x:hidden; font-family:'Cormorant Garamond',serif; background:radial-gradient(circle at 50% -8%, rgba(246, 226, 180, 0.22) 0%, transparent 28%), radial-gradient(circle at 14% 18%, rgba(191, 213, 255, 0.14) 0%, transparent 22%), linear-gradient(180deg, #1a2a45 0%, #10192b 42%, #090f1a 100%); }
        body::before, body::after { content:""; position:fixed; inset:0; pointer-events:none; }
        body::before { background:linear-gradient(90deg, transparent 8%, rgba(255,255,255,.05) 8.3%, transparent 8.6%), linear-gradient(90deg, transparent 91%, rgba(255,255,255,.05) 91.3%, transparent 91.6%), radial-gradient(circle at 50% 14%, rgba(246, 226, 180, 0.12) 0%, transparent 18%); opacity:.8; }
        body::after { background:linear-gradient(180deg, transparent 70%, rgba(191, 213, 255, 0.08) 100%); }
        header { background:linear-gradient(180deg, rgba(8, 14, 25, 0.96), rgba(19, 32, 52, 0.76)); border-bottom:1px solid rgba(191, 213, 255, 0.28); box-shadow:0 12px 34px rgba(6, 10, 18, 0.42); backdrop-filter:blur(12px); }
        header h1 { color:var(--primary); font-family:'Marcellus SC',serif; letter-spacing:.16em; text-shadow:0 0 16px rgba(191, 213, 255, 0.16); }
        nav ul { flex-wrap:wrap; }
        nav a:hover { color:var(--primary-hover); text-shadow:0 0 10px rgba(191, 213, 255, 0.18); }
        main { max-width:1040px; margin:54px auto; padding:0 20px 36px; }
        .translator-container { background:linear-gradient(180deg, rgba(21, 31, 51, 0.94), rgba(12, 19, 32, 0.9)); border:1px solid rgba(191, 213, 255, 0.2); border-radius:30px; padding:46px 40px; box-shadow:var(--border-glow); }
        .translator-container::before { background:linear-gradient(to right, transparent, var(--secondary), transparent); opacity:.45; }
        .translator-header h2 { color:var(--primary); font-family:'Marcellus SC',serif; font-size:2.46em; letter-spacing:.12em; }
        .translator-header p { color:var(--text-muted); font-size:1.2em; margin-top:12px; }
        textarea { min-height:150px; padding:20px 22px; background:linear-gradient(180deg, rgba(11, 17, 30, 0.96), rgba(8, 13, 24, 0.92)); border:1px solid rgba(191, 213, 255, 0.18); border-radius:18px; font-family:'Cormorant Garamond',serif; font-size:1.16em; box-shadow:inset 0 1px 0 rgba(255,255,255,.03); }
        textarea::placeholder { color:rgba(196, 208, 228, 0.72); }
        textarea:hover, textarea:focus { border-color:rgba(246, 226, 180, 0.36); box-shadow:0 0 0 4px rgba(191, 213, 255, 0.1), 0 0 18px rgba(191, 213, 255, 0.12); }
        .output-box { background:linear-gradient(180deg, rgba(13, 19, 31, 0.96), rgba(9, 13, 22, 0.92)); border:1px solid rgba(191, 213, 255, 0.18); border-radius:22px; padding:38px 26px; box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 18px 32px rgba(6, 10, 18, 0.3); }
        .output-label { top:-12px; left:26px; background:#122039; border:1px solid rgba(191, 213, 255, 0.18); border-radius:999px; color:var(--primary); letter-spacing:.12em; }
        .translation-text { font-size:2.04em; font-family:'Marcellus SC',serif; text-shadow:0 0 16px rgba(191, 213, 255, 0.14); }
        .error-log { color:#ffd7bd; text-shadow:none; }
        footer { color:#b8c7de; border-top-color:rgba(191, 213, 255, 0.08); }

        /* Shared translator polish */
        main {
            max-width: 1120px;
            margin: 44px auto 48px;
            padding: 0 18px 38px;
            display: grid;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        main::before {
            content: "";
            position: absolute;

        }

        header {
            backdrop-filter: blur(14px);
        }

        nav ul {
            gap: 12px;
            flex-wrap: wrap;
        }

        nav a {
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        }

        nav a:hover {
            border-color: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        .forge-container,
        .translator-container,
        .forest-container {
            position: relative;
            overflow: hidden;
            margin-top: 0;
            border-radius: 34px;
            padding: 46px 40px;

            backdrop-filter: blur(14px);
        }

        .forge-container::before,
        .translator-container::before,
        .forest-container::before {

            border-radius: 24px;
        }

        .forge-container::after,
        .translator-container::after,
        .forest-container::after {

        }

        .forge-header,
        .translator-header,
        .forest-header {

            margin-bottom: 34px;

            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        .forge-header::after,
        .translator-header::after,
        .forest-header::after {
            content: "";
            position: absolute;

            opacity: 0.82;

        .forge-header h2,
        .translator-header h2,
        .forest-header h2 {

        .forge-header p.subtitle,
        .translator-header p,

        textarea,
        input[type='text'],
        input[type='number'],
        select {

            border-radius: 18px;

        textarea:hover,
        textarea:focus,
        input[type='text']:hover,

        .output-label {
            top: -12px;

            border-radius: 999px;

            .translator-container,

                border-radius: 24px;
            }

            .forge-header,
            .translator-header,
            .forest-header {
                margin-bottom: 26px;
                padding-bottom: 18px;
            }
        }
    </style>

<body>
    <header>
        <h1>Indomitus Fantasy</h1>
        <nav>
            <ul>
                <li><a href="tradutores.html">Linguística</a></li>
                <li><a href="menu.html">Início</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="translator-container">
            <div class="translator-header">
                <h2>Códice Imperial Edelin</h2>
                <p>A voz litúrgica de impérios sagrados. O Comum ascende em ouro, mármore e rito.</p>
            </div>

            <div class="input-box">
                <textarea id="inputText" placeholder="Escreva como em um rito solar..." oninput="processTranscription()"></textarea>
            </div>

            <div class="output-box">
                <div class="output-label">Resplendor Sagrado</div>
                <div id="outputText" class="translation-text">A guardiã descansa no silêncio...</div>
            </div>
            
            <div id="errorLog" class="error-log"></div>
        </div>
    </main>

    <script>
        // Mapeamento fonético original (mantido conforme solicitado)
        const PHONETIC_MAP = {
            // Unidades compostas (checar primeiro)
            'ae': 'āy', 'oe': 'ō', 'au': 'āw', 'ei': 'ēh', 'ui': 'ūh',
            'ph': 'f', 'th': 't', 'ch': 'kh', 'sh': 's',
            // Unidades simples
            'a': 'āh', 'e': 'esh', 'i': 'ih', 'o': 'or', 'u': 'ul', 'y': 'yel',
            'b': 'bar', 'c': 'ch', 'd': 'dal', 'f': 'ph', 'g': 'gar', 'h': 'ha',
            'j': 'y', 'k': 'q', 'l': 'el', 'm': 'ma', 'n': 'nah', 'p': 'peh',
            'q': 'qu', 'r': 'ra', 's': 'sha', 't': 'tha', 'v': 'ver', 'w': 'wa',
            'x': 'z', 'z': 'zah'
        };

        function smoothTranscription(text) {
            // Regras de Suavização Imperial (reduz o tamanho para ser falável)
            return text
                .replace(/aa|āā|āh āh/g, 'ā')          // Funde vogais idênticas
                .replace(/hh+/g, 'h')                 // Remove 'h' excessivos
                .replace(/āhāh/g, 'āh')               // Funde āh + āh
                .replace(/āha/g, 'āha')               // Mantém fluidez
                .replace(/sha ha/g, 'sha')            // Simplifica sotaque
                .replace(/([āaeiou])h \1h/g, '$1h')   // Funde sons repetidos como "āh āh"
                .replace(/(\w)\1/g, '$1')             // Remove consoantes dobradas (ex: mm -> m)
                .replace(/shash/g, 'shā')              // Contração silábica
                .replace(/h /g, 'h');                 // Remove espaços internos de transcrição
        }

        function processTranscription() {
            const input = document.getElementById("inputText").value.toLowerCase();
            const outputEl = document.getElementById("outputText");
            const errorEl = document.getElementById("errorLog");

            if (!input.trim()) {
                outputEl.textContent = "A guardiã descansa no silêncio...";
                errorEl.textContent = "";
                return;
            }

            let rawResult = "";
            let i = 0;
            let errorFound = false;

            while (i < input.length) {
                const char = input[i];

                if (char === " " || char === "\n") {
                    rawResult += " ";
                    i++;
                    continue;
                }

                const dual = input.substr(i, 2);
                if (PHONETIC_MAP[dual]) {
                    rawResult += PHONETIC_MAP[dual] + " ";
                    i += 2;
                } 
                else if (PHONETIC_MAP[char]) {
                    rawResult += PHONETIC_MAP[char] + " ";
                    i++;
                } 
                else if (/[.,!?;:]/.test(char)) {
                    rawResult += char;
                    i++;
                }
                else {
                    errorFound = true;
                    rawResult += char;
                    i++;
                }
            }

            // Aplica a suavização linguística
            const finalResult = smoothTranscription(rawResult);

            errorEl.textContent = errorFound ? "Alguns glifos impuros não foram reconhecidos pelo Códice." : "";
            outputEl.textContent = finalResult.trim();
        }
    </script>
