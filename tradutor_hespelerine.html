<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indomitus Fantasy - Hespelerine</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --primary-hover: #f7c873;
            --primary-glow: rgba(212, 175, 55, 0.6);
            --bg-dark: #121214;
            --bg-panel: rgba(30, 30, 35, 0.85);
            --bg-input: rgba(15, 15, 20, 0.9);
            --text-main: #f4f4f4;
            --text-muted: #b0b0b0;
            --border-glow: 0 0 15px rgba(212, 175, 55, 0.3);
            --transition: all 0.3s ease;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cinzel', serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(to bottom, rgba(10,10,12,0.95), rgba(20,20,25,0.8));
            border-bottom: 2px solid var(--primary);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 5px 20px var(--primary-glow);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            margin: 0; font-size: 2.5em; color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
            font-family: 'MedievalSharp', serif;
            letter-spacing: 2px;
        }

        nav ul {
            list-style: none; padding: 0; margin: 15px 0 0 0;
            display: flex; justify-content: center; gap: 30px;
        }

        nav a {
            color: var(--text-muted); text-decoration: none;
            font-size: 1.1em; font-weight: bold; transition: var(--transition);
        }

        nav a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); }

        main { max-width: 900px; margin: 40px auto; padding: 0 20px; flex: 1; }

        .forge-container {
            background: var(--bg-panel);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 12px; padding: 30px;
            box-shadow: var(--border-glow);
            backdrop-filter: blur(10px);
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .forge-header h2 {
            text-align: center; color: var(--primary); font-size: 2em; margin-bottom: 30px;
            border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 15px;
            font-family: 'MedievalSharp', serif;
        }
        
        .forge-header p.subtitle {
            text-align: center; color: var(--text-muted); font-size: 1.1em;
            margin-top: -15px; margin-bottom: 30px;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .form-group label { display: block; margin-bottom: 8px; color: var(--primary); font-weight: bold; }
        
        select, input[type='number'], input[type='text'] {
            width: 100%; padding: 12px 15px; font-size: 1em; font-family: 'Cinzel', serif;
            color: var(--text-main); background-color: var(--bg-input);
            border: 1px solid #444; border-radius: 6px; transition: var(--transition); box-sizing: border-box;
        }

        select:hover, input:hover, select:focus, input:focus {
            border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); outline: none;
        }

        .action-btn {
            background: linear-gradient(145deg, #111, #222); border: 2px solid var(--primary);
            color: var(--primary); font-family: 'Cinzel', serif; font-size: 1.2em; font-weight: bold;
            padding: 15px 30px; border-radius: 8px; cursor: pointer; display: block; margin: 30px auto;
            transition: var(--transition); text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(212,175,55,0.2); width: 100%; max-width: 400px;
            text-align: center; text-decoration: none;
        }

        .action-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow); transform: translateY(-2px); }

        .btn-list {
            display: flex; flex-direction: column; gap: 15px; padding: 20px 0;
            max-width: 500px; margin: 0 auto;
        }

        .btn-list .action-btn {
            margin: 0; max-width: 100%;
        }

        .output {
            margin-top: 30px; padding: 20px; text-align: center;
            font-size: 1.5em; font-weight: bold; color: var(--primary);
            background: rgba(10,10,15,0.9); border: 1px solid var(--primary);
            border-radius: 12px; box-shadow: 0 0 25px rgba(212,175,55,0.4);
            word-wrap: break-word; white-space: pre-wrap; 
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .error { color: #ff3333; text-align: center; margin-top: 10px; font-weight: bold; text-shadow: 0 0 5px #ff0000; }

        * { box-sizing: border-box; }
        :root { --primary:#f7ead2; --primary-hover:#fff6e8; --secondary:#8ec3c8; --bg-dark:#09171a; --bg-panel:rgba(11,28,32,.78); --bg-input:rgba(8,21,24,.88); --text-main:#f7ffff; --text-muted:#c2d7d8; --primary-glow:rgba(142,195,200,.26); --border-glow:0 24px 58px rgba(6,14,16,.34); }
        body { position:relative; overflow-x:hidden; font-family:'Cormorant Garamond',serif; background:radial-gradient(circle at 50% -8%, rgba(247,234,210,.24) 0%, transparent 28%), radial-gradient(circle at 18% 24%, rgba(142,195,200,.18) 0%, transparent 25%), radial-gradient(circle at 84% 18%, rgba(212,244,247,.1) 0%, transparent 20%), linear-gradient(180deg, #15343a 0%, #0c2125 40%, #081518 100%); }
        body::before, body::after { content:""; position:fixed; inset:0; pointer-events:none; }
        body::before { background:linear-gradient(180deg, transparent 62%, rgba(142,195,200,.09) 100%), radial-gradient(circle at 12% 82%, rgba(247,234,210,.14) 0%, transparent 18%), radial-gradient(circle at 84% 88%, rgba(142,195,200,.12) 0%, transparent 18%); }
        body::after { background:linear-gradient(135deg, transparent 10%, rgba(255,255,255,.04) 50%, transparent 90%); opacity:.7; }
        header { background:linear-gradient(180deg, rgba(8,20,23,.96), rgba(15,41,46,.74)); border-bottom:1px solid rgba(142,195,200,.28); box-shadow:0 12px 34px rgba(4,9,10,.38); backdrop-filter:blur(12px); }
        header h1 { color:var(--primary); font-family:'Marcellus SC',serif; letter-spacing:.16em; text-shadow:0 0 14px rgba(247,234,210,.12); }
        nav ul { flex-wrap:wrap; }
        nav a:hover { color:var(--primary-hover); text-shadow:0 0 10px rgba(142,195,200,.16); }
        main { max-width:980px; margin:54px auto; padding:0 20px 36px; }
        .forge-container { position:relative; overflow:hidden; background:linear-gradient(180deg, rgba(11,30,35,.92), rgba(7,20,23,.88)); border:1px solid rgba(142,195,200,.2); border-radius:28px; padding:42px 36px; box-shadow:var(--border-glow); }
        .forge-container::before { content:""; position:absolute; inset:16px; border:1px solid rgba(247,234,210,.1); border-radius:20px; pointer-events:none; }
        .forge-container::after { content:""; position:absolute; inset:0; background:linear-gradient(125deg, transparent 14%, rgba(247,234,210,.05) 50%, transparent 86%); pointer-events:none; }
        .forge-header h2 { color:var(--primary); font-family:'Marcellus SC',serif; font-size:2.18em; letter-spacing:.12em; border-bottom-color:rgba(142,195,200,.16); margin-bottom:16px; }
        .forge-header p.subtitle { color:var(--text-muted); font-size:1.22em; margin:0 auto 34px; max-width:620px; line-height:1.5; }
        select, input[type='number'], input[type='text'] { padding:16px 18px; font-size:1.12em; font-family:'Cormorant Garamond',serif; background:linear-gradient(180deg, rgba(8,21,24,.96), rgba(6,16,18,.92)); border:1px solid rgba(142,195,200,.2); border-radius:18px; box-shadow:inset 0 1px 0 rgba(255,255,255,.03); }
        input::placeholder { color:rgba(194,215,216,.72); }
        select:hover, input:hover, select:focus, input:focus { border-color:rgba(247,234,210,.34); box-shadow:0 0 0 4px rgba(142,195,200,.1), 0 0 18px rgba(142,195,200,.12); }
        .output { margin-top:28px; padding:24px 22px; background:linear-gradient(180deg, rgba(10,24,27,.96), rgba(7,17,19,.92)); border:1px solid rgba(142,195,200,.2); border-radius:22px; color:var(--primary); font-size:1.6em; font-weight:600; box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 18px 32px rgba(4,9,10,.28); text-shadow:0 0 14px rgba(247,234,210,.1); line-height:1.35; }
        .error { color:#ffd5c1; margin-top:14px; text-shadow:none; }
        @media (max-width:700px){ header h1{font-size:2em;} main{margin-top:30px; padding:0 14px 28px;} .forge-container{padding:28px 22px; border-radius:22px;} .forge-header h2{font-size:1.68em;} .forge-header p.subtitle{font-size:1.08em;} select, input[type='number'], input[type='text']{padding:14px 16px; font-size:1.04em;} .output{font-size:1.24em; padding:20px 18px;} }
    
        /* Shared translator polish */
        main {
            max-width: 1120px;
            margin: 44px auto 48px;
            padding: 0 18px 38px;
            display: grid;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        main::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 120px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 56%);
            opacity: 0.9;
            pointer-events: none;
        }

        header {
            backdrop-filter: blur(14px);
        }

        nav ul {
            gap: 12px;
            flex-wrap: wrap;
        }

        nav a {
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        }

        nav a:hover {
            border-color: rgba(255,255,255,0.14);
            transform: translateY(-1px);
        }

        .forge-container,
        .translator-container,
        .forest-container {
            position: relative;
            overflow: hidden;
            margin-top: 0;
            border-radius: 34px;
            padding: 46px 40px;
            box-shadow: var(--border-glow), 0 22px 52px rgba(0,0,0,0.28);
            backdrop-filter: blur(14px);
        }

        .forge-container::before,
        .translator-container::before,
        .forest-container::before {
            inset: 16px;
            border-radius: 24px;
        }

        .forge-container::after,
        .translator-container::after,
        .forest-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, transparent 16%, rgba(255,255,255,0.04) 50%, transparent 84%);
            pointer-events: none;
        }

        .forge-header,
        .translator-header,
        .forest-header {
            position: relative;
            margin-bottom: 34px;
            padding-bottom: 22px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        .forge-header::after,
        .translator-header::after,
        .forest-header::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -1px;
            width: 126px;
            height: 1px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.82;
        }

        .forge-header h2,
        .translator-header h2,
        .forest-header h2 {
            font-size: clamp(2rem, 4vw, 2.85rem);
            margin: 0;
        }

        .forge-header p.subtitle,
        .translator-header p,
        .forest-header p {
            max-width: 700px;
            margin: 14px auto 0;
            line-height: 1.62;
            font-size: 1.18em;
            font-style: normal;
        }

        textarea,
        input[type='text'],
        input[type='number'],
        select {
            width: 100%;
            border-radius: 18px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
        }

        textarea:hover,
        textarea:focus,
        input[type='text']:hover,
        input[type='text']:focus,
        input[type='number']:hover,
        input[type='number']:focus,
        select:hover,
        select:focus {
            transform: translateY(-1px);
        }

        .output,
        .output-box {
            border-radius: 24px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 18px 34px rgba(0,0,0,0.24);
        }

        .output-label {
            top: -12px;
            left: 24px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.12);
            padding: 4px 14px;
            letter-spacing: 0.12em;
        }

        #transcription,
        .translation-text,
        .output {
            line-height: 1.36;
        }

        @media (max-width: 700px) {
            main {
                margin-top: 30px;
                padding: 0 14px 28px;
            }

            .forge-container,
            .translator-container,
            .forest-container {
                padding: 30px 22px;
                border-radius: 24px;
            }

            .forge-header,
            .translator-header,
            .forest-header {
                margin-bottom: 26px;
                padding-bottom: 18px;
            }
        }
    </style>

</head>
<body>
    <header>
        <h1>Indomitus Fantasy</h1>
        <nav>
            <ul>
                <li><a href="tradutores.html">Voltar aos Costumes (Idiomas)</a></li>
                <li><a href="menu.html">Hub Principal</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="forge-container">
            <div class="forge-header">
                <h2>Canto de Hespelerine</h2>
                <p class="subtitle">Ondas claras e brisa salina moldam o Hespelerine. O idioma comum retorna como maré antiga e pérolas de espuma.</p>
            </div>
            
            <div class="form-group full-width">
                <input type="text" id="inputWord" placeholder="Escreva como quem fala ao mar..." oninput="transcribeWord()" autocomplete="off">
                <div id="error" class="error"></div>
            </div>

            <div id="transcription" class="output">A guardiã descansa...</div>
        </div>
    </main>

    <script>
        function transcribeWord() {
            const inputElement = document.getElementById("inputWord");
            const transcriptionElement = document.getElementById("transcription");
            const errorElement = document.getElementById("error");
            const word = inputElement.value.toLowerCase();

            const transcriptionMap = {
                'a':  'āi',
    'e':  'aē',
    'i':  'īl',
    'o':  'aōl',
    'u':  'ūs',
    'y':  'ȳl',
    'b':  'v',
    'c':  'k',
    'd':  'dh',
    'f':  'phe',
    'g':  'g',
    'h':  'h',
    'j':  'y',
    'k':  'yel',
    'l':  'l',
    'm':  'm',
    'n':  'n',
    'p':  'p',
    'q':  'q',
    'r':  'rh',
    's':  's',
    't':  'th',
    'v':  'v',
    'w':  'v',    
    'x':  'x',      
    'z':  'zh',
    'ae': 'æ',
    'oe': 'Å"',
    'ai': 'ai',
    'au': 'au',
    'ea': 'ea',
    'eu': 'eú',
    'ui': 'uî',
    'pr': 'ph',
    'th': 'th',
    'kh': 'kh',
    'gh': 'gh',
    'ch': 'kh',
    'ps': 'ps',
    'rh': 'rh',
    'sh': 'sh',
    'dr': 'dr',
    'sc': 'sk',
    'mn': 'mn',
    'pt': 'pt',
    'é':  'ḗ',
    'ê':  'ê',
    'ã':  'â',
    'õ':  'ô',
    ',':  ',',
    '.':  '.',
 };

            let transcription = "";
            let lastTranscribedChar = "";
            let hasError = false;

            if(word.length === 0) {
                transcriptionElement.textContent = "A guardiã descansa...";
                errorElement.textContent = "";
                return;
            }

            for (const letter of word) {
                if (letter === " ") {
                    transcription += " ";
                    lastTranscribedChar = "";
                    continue;
                }

                const transcribedLetter = transcriptionMap[letter];
                
                if (transcribedLetter) {
                    if (transcribedLetter.charAt(0) === lastTranscribedChar) {
                        transcription += transcribedLetter.substring(1);
                    } else {
                        transcription += transcribedLetter;
                    }
                    lastTranscribedChar = transcription.charAt(transcription.length - 1);
                } else {
                    errorElement.textContent = `Alfabeto incapaz de reconhecer símbolo profano: "${letter}"`;
                    hasError = true;
                }
            }

            if (!hasError) {
                errorElement.textContent = "";
            }

            transcriptionElement.innerHTML = `<span style="color:var(--text-muted); font-size:0.6em; display:block; margin-bottom:10px;">TRADUÇÃO FONÉTICA:</span>${transcription}`;
        }
    </script>
</body>
