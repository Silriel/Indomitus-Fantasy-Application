<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indomitus Fantasy - Dracônico Antigo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Alegreya:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --primary-hover: #f7c873;
            --primary-glow: rgba(212, 175, 55, 0.6);
            --bg-dark: #121214;
            --bg-panel: rgba(30, 30, 35, 0.85);
            --bg-input: rgba(15, 15, 20, 0.9);
            --text-main: #f4f4f4;
            --text-muted: #b0b0b0;
            --border-glow: 0 0 15px rgba(212, 175, 55, 0.3);
            --transition: all 0.3s ease;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cinzel', serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(to bottom, rgba(10,10,12,0.95), rgba(20,20,25,0.8));
            border-bottom: 2px solid var(--primary);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 5px 20px var(--primary-glow);
            position: sticky; top: 0; z-index: 100;
        }

        header h1 {
            margin: 0; font-size: 2.5em; color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
            font-family: 'MedievalSharp', serif;
            letter-spacing: 2px;
        }

        nav ul {
            list-style: none; padding: 0; margin: 15px 0 0 0;
            display: flex; justify-content: center; gap: 30px;
        }

        nav a {
            color: var(--text-muted); text-decoration: none;
            font-size: 1.1em; font-weight: bold; transition: var(--transition);
        }

        nav a:hover { color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); }

        main { max-width: 900px; margin: 40px auto; padding: 0 20px; flex: 1; }

        .forge-container {
            background: var(--bg-panel);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 12px; padding: 30px;
            box-shadow: var(--border-glow);
            backdrop-filter: blur(10px);
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .forge-header h2 {
            text-align: center; color: var(--primary); font-size: 2em; margin-bottom: 30px;
            border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 15px;
            font-family: 'MedievalSharp', serif;
        }
        
        .forge-header p.subtitle {
            text-align: center; color: var(--text-muted); font-size: 1.1em;
            margin-top: -15px; margin-bottom: 30px;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .form-group label { display: block; margin-bottom: 8px; color: var(--primary); font-weight: bold; }
        
        select, input[type='number'], input[type='text'] {
            width: 100%; padding: 12px 15px; font-size: 1em; font-family: 'Cinzel', serif;
            color: var(--text-main); background-color: var(--bg-input);
            border: 1px solid #444; border-radius: 6px; transition: var(--transition); box-sizing: border-box;
        }

        select:hover, input:hover, select:focus, input:focus {
            border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); outline: none;
        }

        .action-btn {
            background: linear-gradient(145deg, #111, #222); border: 2px solid var(--primary);
            color: var(--primary); font-family: 'Cinzel', serif; font-size: 1.2em; font-weight: bold;
            padding: 15px 30px; border-radius: 8px; cursor: pointer; display: block; margin: 30px auto;
            transition: var(--transition); text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(212,175,55,0.2); width: 100%; max-width: 400px;
            text-align: center; text-decoration: none;
        }

        .action-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow); transform: translateY(-2px); }

        .btn-list {
            display: flex; flex-direction: column; gap: 15px; padding: 20px 0;
            max-width: 500px; margin: 0 auto;
        }

        .btn-list .action-btn {
            margin: 0; max-width: 100%;
        }

        .output {
            margin-top: 30px; padding: 20px; text-align: center;
            font-size: 1.5em; font-weight: bold; color: var(--primary);
            background: rgba(10,10,15,0.9); border: 1px solid var(--primary);
            border-radius: 12px; box-shadow: 0 0 25px rgba(212,175,55,0.4);
            word-wrap: break-word; white-space: pre-wrap; 
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .error { color: #ff3333; text-align: center; margin-top: 10px; font-weight: bold; text-shadow: 0 0 5px #ff0000; }

        * { box-sizing: border-box; }
        :root { --primary:#f2b36c; --primary-hover:#ffd1a3; --secondary:#8f4b28; --bg-dark:#120907; --bg-panel:rgba(34,16,10,.82); --bg-input:rgba(24,10,7,.9); --text-main:#fff3e6; --text-muted:#d1a98b; --primary-glow:rgba(242,179,108,.25); --border-glow:0 24px 58px rgba(20,8,5,.42); }
        body { position:relative; overflow-x:hidden; font-family:'Alegreya',serif; background:radial-gradient(circle at 50% -8%, rgba(255,170,92,.18) 0%, transparent 30%), radial-gradient(circle at 12% 20%, rgba(255,205,153,.08) 0%, transparent 20%), linear-gradient(180deg, #2b120a 0%, #160b07 40%, #090403 100%); }
        body::before, body::after { content:""; position:fixed; inset:0; pointer-events:none; }
        body::before { background:radial-gradient(2px 2px at 14% 18%, rgba(255,202,139,.55), transparent 60%), radial-gradient(2px 2px at 72% 14%, rgba(255,143,77,.45), transparent 60%), radial-gradient(2px 2px at 84% 32%, rgba(255,193,128,.35), transparent 60%); opacity:.9; }
        body::after { background:linear-gradient(180deg, transparent 68%, rgba(143,75,40,.12) 100%); }
        header { background:linear-gradient(180deg, rgba(20,8,5,.96), rgba(42,18,10,.76)); border-bottom:1px solid rgba(242,179,108,.28); box-shadow:0 12px 34px rgba(8,3,2,.55); backdrop-filter:blur(10px); }
        header h1 { color:var(--primary); font-family:'Cinzel Decorative',serif; letter-spacing:3px; text-shadow:0 0 18px rgba(255,167,99,.16); }
        nav ul { flex-wrap:wrap; }
        nav a { letter-spacing:.06em; }
        nav a:hover { color:var(--primary-hover); text-shadow:0 0 10px rgba(255,167,99,.2); }
        main { max-width:980px; margin:54px auto; padding:0 20px 36px; }
        .forge-container { position:relative; overflow:hidden; background:linear-gradient(180deg, rgba(39,18,11,.94), rgba(18,8,6,.9)); border:1px solid rgba(242,179,108,.18); border-radius:28px; padding:42px 36px; box-shadow:var(--border-glow); }
        .forge-container::before { content:""; position:absolute; inset:16px; border:1px solid rgba(255,224,181,.1); border-radius:20px; pointer-events:none; }
        .forge-container::after { content:""; position:absolute; inset:0; background:linear-gradient(140deg, transparent 14%, rgba(255,170,92,.06) 50%, transparent 86%); pointer-events:none; }
        .forge-header h2 { color:var(--primary); font-family:'Cinzel Decorative',serif; font-size:2.18em; letter-spacing:.08em; border-bottom-color:rgba(242,179,108,.16); margin-bottom:16px; }
        .forge-header p.subtitle { color:var(--text-muted); font-size:1.22em; margin:0 auto 34px; max-width:620px; line-height:1.5; }
        select, input[type='number'], input[type='text'] { padding:16px 18px; font-size:1.12em; font-family:'Alegreya',serif; background:linear-gradient(180deg, rgba(24,10,7,.95), rgba(18,8,6,.92)); border:1px solid rgba(242,179,108,.18); border-radius:18px; box-shadow:inset 0 1px 0 rgba(255,255,255,.03); }
        input::placeholder { color:rgba(209,169,139,.68); }
        select:hover, input:hover, select:focus, input:focus { border-color:rgba(242,179,108,.46); box-shadow:0 0 0 4px rgba(242,179,108,.1), 0 0 18px rgba(255,130,71,.14); }
        .output { margin-top:28px; padding:24px 22px; background:linear-gradient(180deg, rgba(20,9,6,.96), rgba(12,5,4,.92)); border:1px solid rgba(242,179,108,.18); border-radius:22px; color:var(--primary); font-size:1.6em; font-weight:600; box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 18px 32px rgba(8,3,2,.38); text-shadow:0 0 14px rgba(255,164,94,.14); line-height:1.35; }
        .error { color:#ffd4ae; margin-top:14px; text-shadow:none; }
        @media (max-width:700px){ header h1{font-size:2em;} main{margin-top:30px; padding:0 14px 28px;} .forge-container{padding:28px 22px; border-radius:22px;} .forge-header h2{font-size:1.7em;} .forge-header p.subtitle{font-size:1.08em;} select, input[type='number'], input[type='text']{padding:14px 16px; font-size:1.04em;} .output{font-size:1.24em; padding:20px 18px;} }
    
        </style>
    <link rel="stylesheet" href="tradutor_shared.css">
    <link rel="stylesheet" href="tradutores_tabs.css">
    <script defer src="tradutores_tabs.js"></script>
</head>
<body>
    <header>
        <h1>Indomitus Fantasy</h1>
        <nav>
            <ul>
                <li><a href="tradutores.html">Voltar aos Costumes (Idiomas)</a></li>
                <li><a href="menu.html">Hub Principal</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="forge-container">
            <div class="forge-header">
                <h2>Runas do Primeiro Voo</h2>
                <p class="subtitle">Sopro fossilizado de eras dracônicas. Cada palavra desperta brasas antigas no Dracônico Antigo.</p>
            </div>
            
            <div class="form-group full-width">
                <input type="text" id="inputWord" placeholder="Escreva como quem acorda um dragão ancestral..." oninput="transcribeWord()" autocomplete="off">
                <div id="error" class="error"></div>
            </div>

            <div id="transcription" class="output">A guardiã descansa...</div>
        </div>
    </main>

    <script>
        function transcribeWord() {
            const inputElement = document.getElementById("inputWord");
            const transcriptionElement = document.getElementById("transcription");
            const errorElement = document.getElementById("error");
            const word = inputElement.value.toLowerCase();

            const transcriptionMap = {
               a: "Draak",
b: "Zyrn",
c: "Gral'th",
d: "Vokar",
e: "Nahrx",
f: "Thurn",
g: "Groz'kal",
h: "Qurvorn",
i: "Jorvahn",
j: "Kraxx",
k: "Wyrm'kar",
l: "Zenthro",
m: "Draakh",
n: "Nyrvorn",
o: "Vol'kran",
p: "Pthoran",
q: "Zyraxor",
r: "Rylthak",
s: "Skarnul",
t: "Tormak",
u: "Ulzurn",
v: "Vrothaan",
w: "Wulkar",
x: "Xyrkoth",
y: "Ythraal",
z: "Zarnathor"

            };

            let transcription = "";
            let lastTranscribedChar = "";
            let hasError = false;

            if(word.length === 0) {
                transcriptionElement.textContent = "A guardiã descansa...";
                errorElement.textContent = "";
                return;
            }

            for (const letter of word) {
                if (letter === " ") {
                    transcription += " ";
                    lastTranscribedChar = "";
                    continue;
                }

                const transcribedLetter = transcriptionMap[letter];
                
                if (transcribedLetter) {
                    if (transcribedLetter.charAt(0) === lastTranscribedChar) {
                        transcription += transcribedLetter.substring(1);
                    } else {
                        transcription += transcribedLetter;
                    }
                    lastTranscribedChar = transcription.charAt(transcription.length - 1);
                } else {
                    errorElement.textContent = `Alfabeto incapaz de reconhecer símbolo profano: "${letter}"`;
                    hasError = true;
                }
            }

            if (!hasError) {
                errorElement.textContent = "";
            }

            transcriptionElement.innerHTML = `<span style="color:var(--text-muted); font-size:0.6em; display:block; margin-bottom:10px;">TRADUÇÃO FONÉTICA:</span>${transcription}`;
        }
    </script>
</body>
</html>
