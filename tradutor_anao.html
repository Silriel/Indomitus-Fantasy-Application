    <style>
        :root {
            --primary: #8b8b8b; /* Cinza Pedra */
            --primary-highlight: #d4af37; /* Detalhes em Ouro */
            --primary-glow: rgba(212, 175, 55, 0.3);
            --bg-dark: #0a0a0c;
            --bg-panel: rgba(25, 25, 30, 0.95);
            --bg-input: rgba(15, 15, 20, 0.9);
            --text-main: #e0e0e0;
            --text-muted: #808080;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Cinzel', serif;
            background-image:

            min-height: 100vh;
            display: flex; flex-direction: column;

        header {
            background: linear-gradient(to bottom, #000, rgba(20,20,22,0.9));
            border-bottom: 3px solid var(--primary-highlight);
            padding: 20px 0;
            text-align: center;

            position: sticky; top: 0; z-index: 100;

        header h1 {
            margin: 0; font-size: 2.5em; color: var(--primary-highlight);
            text-shadow: 0 0 10px var(--primary-glow);
            font-family: 'MedievalSharp', serif;
            letter-spacing: 2px; text-transform: uppercase;
        }

        nav ul {
            list-style: none; padding: 0; margin: 15px 0 0 0;
            display: flex; justify-content: center; gap: 30px;
        }

        nav a {
            color: var(--text-muted); text-decoration: none;
            font-size: 1.1em; font-weight: bold; transition: var(--transition);
        }

        nav a:hover { color: var(--primary-highlight); text-shadow: 0 0 8px var(--primary-glow); }

        main { max-width: 900px; margin: 40px auto; padding: 0 20px; flex: 1; }

        .forge-container {
            background: var(--bg-panel);
            border: 2px solid #333;
            border-radius: 12px; padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .forge-container::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, var(--primary-highlight), transparent);

            text-align: center; color: var(--primary-highlight); font-size: 2.2em; margin: 0;

        textarea:focus { border-color: var(--primary-highlight); outline: none; }

        .output {
            margin-top: 40px; padding: 30px; text-align: center;

        textarea { min-height:130px; padding:18px 20px; background:linear-gradient(180deg, rgba(24, 17, 12, 0.96), rgba(18, 13, 9, 0.92)); border:1px solid rgba(255, 211, 153, 0.16); border-radius:18px; font-family:'Alegreya',serif; font-size:1.12em; box-shadow:inset 0 1px 0 rgba(255,255,255,.03); }
        textarea::placeholder { color:rgba(200, 179, 149, 0.72); }
        textarea:hover, textarea:focus { border-color:rgba(255, 211, 153, 0.42); box-shadow:0 0 0 4px rgba(255, 194, 123, 0.1), 0 0 18px rgba(255, 194, 123, 0.12); }
        .output { margin-top:32px; padding:28px 22px; background:linear-gradient(180deg, rgba(21, 15, 11, 0.96), rgba(12, 8, 6, 0.92)); border:1px solid rgba(255, 211, 153, 0.18); border-radius:22px; color:var(--primary-highlight); font-family:'Marcellus SC',serif; font-size:1.82em; box-shadow:inset 0 1px 0 rgba(255,255,255,.03), 0 18px 32px rgba(8, 5, 3, 0.34); letter-spacing:.04em; text-shadow:0 0 14px rgba(255, 194, 123, 0.12); }

        /* Shared translator polish */
        main {

<body>
    <header>
        <h1>Indomitus Fantasy</h1>
        <nav>
            <ul>
                <li><a href="tradutores.html">Linguística</a></li>
                <li><a href="menu.html">Início</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="forge-container">
            <div class="forge-header">
                <h2>Runas de Khazâd (Anão)</h2>
                <p class="subtitle">Grave suas palavras na bigorna antiga. Khazâd responde em ferro, ouro e fogo contido.</p>
            </div>
            
            <textarea id="inputWord" placeholder="Inscreva palavras na bigorna..." oninput="transcribe()"></textarea>
            <div id="error" class="error"></div>
            <div id="transcription" class="output">A guardiã descansa na pedra...</div>
        </div>
    </main>

    <script>
        const MAP = {
            a: "Bar", b: "Dor", c: "Grum", d: "Thrain", e: "Forn", f: "Krag",
            g: "Storn", h: "Harn", i: "Brist", j: "Jorn", k: "Kragg", l: "Grun",
            m: "Mur", n: "Nor", o: "Thor", p: "Dwor", q: "Quarn", r: "Ragn",
            s: "Sorn", t: "Torn", u: "Dur", v: "Varn", w: "Thrum", x: "Khaz",
            y: "Yarn", z: "Zorn"
        };

        function smooth(text) {
            // Suavização Anã: Mantém a dureza mas remove repetições e encurta
            return text
                .toLowerCase()
                .replace(/([rgnmt])h\1/g, '$1h') // Funde Harn + Nor -> Harnor
                .replace(/grun/g, 'grn')
                .replace(/thrain/g, 'thr')
                .replace(/storn/g, 'stn')
                .replace(/thorn/g, 'thr')
                .replace(/ragn/g, 'rgn')
                .replace(/(\w)\1+/g, '$1') // Remove letras triplas (ex: rrr -> r)
                .replace(/([aeiou])([aeiou])/g, '$1') // Remove vogais duplas para encurtar
                .replace(/orn([rnmt])/g, 'o$1'); // Contração de "orn" (Thor-Nor -> Thonor)
        }

        function transcribe() {
            const word = document.getElementById("inputWord").value.toLowerCase();
            const out = document.getElementById("transcription");
            const errorElement = document.getElementById("error");

            if (!word.trim()) {
                out.textContent = "A guardiã descansa na pedra...";
                errorElement.textContent = "";
                return;
            }

            let raw = "";
            let hasError = false;

            for (const char of word) {
                if (char === " " || char === "\n") {
                    raw += " ";
                    continue;
                }
                if (MAP[char]) {
                    raw += MAP[char];
                } else if (/[.,!?;:]/.test(char)) {
                    raw += char;
                } else {
                    hasError = true;
                }
            }

            let final = smooth(raw);
            // Capitaliza para estética anã
            final = final.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

            errorElement.textContent = hasError ? "Símbolo imundo detectado." : "";
            out.textContent = final;
        }
    </script>
